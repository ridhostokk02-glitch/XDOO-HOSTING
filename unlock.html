<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock Link - XDOO Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --red-candy: #ff0000;
            --red-dark: #8b0000;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 0, 0, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #050505;
            background-image: url('backgroundxdoo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .unlock-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 30px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.1);
        }

        h2 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; margin-bottom: 8px; letter-spacing: 1px; }
        p { font-size: 0.7rem; color: #aaa; margin-bottom: 20px; }

        .step-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 18px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            font-size: 0.8rem;
        }

        .step-btn:hover {
            border-color: var(--red-candy);
            background: rgba(255, 0, 0, 0.05);
        }

        .step-btn.completed {
            border-color: #00ff00;
            color: #00ff00;
            background: rgba(0, 255, 0, 0.05);
        }

        #finalBtn {
            background: #1a1a1a;
            color: #444;
            padding: 16px;
            border-radius: 12px;
            display: block;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 0.85rem;
            margin-top: 20px;
            pointer-events: none;
            transition: all 0.5s ease;
            border: 1px solid transparent;
        }

        #finalBtn.active {
            background: linear-gradient(45deg, var(--red-dark), var(--red-candy));
            color: #fff;
            pointer-events: auto;
            box-shadow: 0 0 25px var(--red-candy);
            transform: scale(1.05);
        }

        footer { margin-top: 25px; font-size: 0.6rem; color: #555; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="unlock-card">
        <i class="fa-solid fa-lock" id="lockIcon" style="font-size: 2.5rem; color: var(--red-candy); margin-bottom: 15px;"></i>
        <h2>LINK TERKUNCI</h2>
        <p>Selesaikan 4 tugas untuk membuka kunci halaman.</p>

        <a href="https://youtube.com/@xdoo-hosting" target="_blank" class="step-btn" onclick="completeStep(1)">
            <span>1. Subscribe Youtube</span>
            <i class="fa-brands fa-youtube" id="icon1"></i>
        </a>

        <a href="https://www.tiktok.com/@sewabot1" target="_blank" class="step-btn" onclick="completeStep(2)">
            <span>2. Follow TikTok</span>
            <i class="fa-brands fa-tiktok" id="icon2"></i>
        </a>

        <a href="https://whatsapp.com/channel/0029Vb6m6X29Gv7W4NNcil3l" target="_blank" class="step-btn" onclick="completeStep(3)">
            <span>3. Join Saluran WA</span>
            <i class="fa-solid fa-bullhorn" id="icon3"></i>
        </a>

        <a href="https://chat.whatsapp.com/BGBiDGwMDkCIii3UtaiSKf" target="_blank" class="step-btn" onclick="completeStep(4)">
            <span>4. Join Grup WA</span>
            <i class="fa-solid fa-users" id="icon4"></i>
        </a>

        <a href="scriptfree.html" id="finalBtn">AMBIL SCRIPT</a>
        
        <footer>Security By XDOO-STORE</footer>
    </div>

    <script>
        let steps = { 1: false, 2: false, 3: false, 4: false };

        function completeStep(n) {
            steps[n] = true;
            const btn = document.getElementsByClassName('step-btn')[n-1];
            const icon = document.getElementById('icon' + n);
            
            btn.classList.add('completed');
            icon.className = "fa-solid fa-circle-check";

            checkUnlock();
        }

        function checkUnlock() {
            if(steps[1] && steps[2] && steps[3] && steps[4]) {
                const final = document.getElementById('finalBtn');
                const lock = document.getElementById('lockIcon');

                final.classList.add('active');
                final.innerHTML = "BUKA SEKARANG";
                
                lock.className = "fa-solid fa-lock-open";
                lock.style.color = "#00ff00";
                lock.style.filter = "drop-shadow(0 0 10px #00ff00)";
            }
        }
    </script>
</body>
</html>
